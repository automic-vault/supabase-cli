name: Setup

description: Perform standard setup and install dependencies using pnpm

inputs:
  dependency-firewall-token:
    description: Token used to authenticate the Dependency Firewall registry
    required: false
    default: ""
  dependency-cache:
    description: >-
      Whether to enable dependency caches. Disable this when the job deletes a
      cached dependency path before exiting, otherwise the post-job cache save
      fails with a path validation error.
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Install toolchains
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      with:
        version: 2026.7.0

    - name: Resolve pnpm store path
      if: inputs.dependency-cache == 'true'
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Configure pnpm dependency cache
      if: inputs.dependency-cache == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-${{ runner.arch }}-

    - name: Resolve Go cache paths
      if: inputs.dependency-cache == 'true'
      id: go-cache
      shell: bash
      run: |
        echo "mod=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
        echo "build=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

    - name: Configure Go dependency cache
      if: inputs.dependency-cache == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ${{ steps.go-cache.outputs.mod }}
          ${{ steps.go-cache.outputs.build }}
        key: go-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/cli-go/go.mod', 'apps/cli-go/go.sum') }}
        restore-keys: |
          go-cache-${{ runner.os }}-${{ runner.arch }}-

    - name: Install dependencies
      shell: bash
      env:
        DEPENDENCY_FIREWALL_TOKEN: ${{ inputs.dependency-firewall-token }}
      run: |
        if [ -z "$DEPENDENCY_FIREWALL_TOKEN" ]; then
          echo "Dependency Firewall token unavailable; using default npm registry."
          pnpm install --frozen-lockfile
          exit 0
        fi

        npmrc="${RUNNER_TEMP}/dependency-firewall.npmrc"
        {
          echo "registry=https://firewall.depthfirst.com/npm/"
          echo "//firewall.depthfirst.com/npm/:_authToken=${DEPENDENCY_FIREWALL_TOKEN}"
        } > "$npmrc"
        NPM_CONFIG_USERCONFIG="$npmrc" pnpm install --frozen-lockfile
