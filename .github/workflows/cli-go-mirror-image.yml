name: Mirror Image

on:
  repository_dispatch:
    types:
      - mirror-image
  workflow_call:
    inputs:
      image:
        required: true
        type: string
    secrets:
      PROD_AWS_ROLE:
        required: true
  workflow_dispatch:
    inputs:
      image:
        description: "org/image:tag"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - id: strip
        env:
          TAG: ${{ github.event.client_payload.image || inputs.image }}
        run: |
          echo "image=${TAG##*/}" >> $GITHUB_OUTPUT
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE }}
          aws-region: us-east-1
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: public.ecr.aws
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Mirror image
        env:
          SOURCE_IMAGE: docker.io/${{ github.event.client_payload.image || inputs.image }}
          ECR_IMAGE: public.ecr.aws/supabase/${{ steps.strip.outputs.image }}
          GHCR_IMAGE: ghcr.io/supabase/${{ steps.strip.outputs.image }}
        run: |
          docker buildx imagetools create \
            --prefer-index=false \
            -t "$ECR_IMAGE" \
            -t "$GHCR_IMAGE" \
            "$SOURCE_IMAGE"
