name: Publish pg_prove

on:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  settings:
    runs-on: ubuntu-latest
    outputs:
      image_tag: supabase/pg_prove:${{ steps.version.outputs.pg_prove }}
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          load: true
          context: https://github.com/horrendo/pg_prove.git
          target: builder
          tags: supabase/pg_prove:builder
      - id: version
        # Replace space with equal to get the raw version string, ie. pg_prove=3.36
        run: |
          docker run --rm -a STDOUT supabase/pg_prove:builder pg_prove --version \
          | tr ' ' '=' \
          >> $GITHUB_OUTPUT
        shell: bash

  build_image:
    needs:
      - settings
    strategy:
      matrix:
        include:
          - runner: [ self-hosted, X64 ]
            arch: amd64
          - runner: arm-runner
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - run: docker context create builders
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          endpoint: builders
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: true
          context: https://github.com/horrendo/pg_prove.git
          tags: ${{ needs.settings.outputs.image_tag }}_${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha,scope=${{ github.ref_name }}-pg_prove-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-pg_prove-${{
            matrix.arch }}

  merge_manifest:
    needs:
      - settings
      - build_image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Merge multi-arch manifests
        env:
          IMAGE_TAG: ${{ needs.settings.outputs.image_tag }}
        run: |
          docker buildx imagetools create -t "${IMAGE_TAG}" \
          "${IMAGE_TAG}_amd64" \
          "${IMAGE_TAG}_arm64"

  publish:
    needs:
      - settings
      - merge_manifest
    # Call workflow explicitly because events from actions cannot trigger more actions
    uses: ./.github/workflows/cli-go-mirror-image.yml
    with:
      image: ${{ needs.settings.outputs.image_tag }}
    secrets:
      PROD_AWS_ROLE: ${{ secrets.PROD_AWS_ROLE }}
defaults:
  run:
    working-directory: apps/cli-go
